# Battery level report interval in seconds
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60
# Increase keyboard debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# Change keyboard default display name
CONFIG_ZMK_KEYBOARD_NAME="Corne"
# Fix battery report related bug on Windows
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# OLED display config
# The Corne shield natively drives the 128x32 SSD1306 OLED (see corne.dtsi);
# enabling ZMK_DISPLAY auto-selects I2C + SSD1306 via the shield defconfig.
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# nice_oled tuning — minimize RAM + BT typing latency (animations kept). See https://github.com/mctechnology17/zmk-nice-oled/blob/main/docs/OPTIMIZE.md
CONFIG_LV_Z_MEM_POOL_SIZE=8192
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_PRIORITY=10
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT_ANIMATION_MS=500
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_MS=1500

# Sleep config
# Milliseconds of inactivity before entering idle state	(10 minute)
CONFIG_ZMK_IDLE_TIMEOUT=600000
# Enable deep sleep support	
CONFIG_ZMK_SLEEP=y
# Milliseconds of inactivity before entering deep sleep (15 minutes)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Mouse/pointing config
CONFIG_ZMK_POINTING=y

# ZMK Studio config (disabled for now — re-enable together with the
# snippet/cmake-args in build.yaml if you want live keymap editing)
# CONFIG_ZMK_STUDIO=y
# CONFIG_ZMK_STUDIO_LOCKING=n
# CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

